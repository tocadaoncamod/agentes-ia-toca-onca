<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Management</title>
    <style>
        /* Your existing CSS styles */
    </style>
</head>
<body>
    <h1>Agent Management</h1>
    <div id="agent-container">
        <h2>Current Agents</h2>
        <!-- Existing content -->
    </div>
    <button id="add-agent">Add New Agent</button>

    <script>
        const API_KEYS_POOL = [
            'key1@example.com',
            'key2@example.com',
            'key3@example.com'
        ];

        let currentKeyIndex = 0;

        function chamarGeminiResiliente(payload) {
            // Logic to call the Gemini API with resilience. This includes key rotation.
            const currentKey = API_KEYS_POOL[currentKeyIndex];
            console.log('Using API Key:', currentKey);
            // Make the API call with the currentKey and payload
            // On success or failure, rotate the key if needed
            currentKeyIndex = (currentKeyIndex + 1) % API_KEYS_POOL.length;
        }

        function sendChat(payload) {
            chamarGeminiResiliente(payload);
            console.log('Current pool email used:', API_KEYS_POOL[currentKeyIndex]);
        }

        function agenteCriadorContas() {
            // Logic to visually add new agents and bind them to a pool identity
            const newAgentEmail = prompt('Enter new agent email:');
            if (newAgentEmail) {
                API_KEYS_POOL.push(newAgentEmail);
                alert('New agent added: ' + newAgentEmail);
            }
        }

        document.getElementById('add-agent').addEventListener('click', agenteCriadorContas);
    </script>
</body>
</html>
