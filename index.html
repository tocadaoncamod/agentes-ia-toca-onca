<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Central 1000 Agentes IA - Toca da Onca Modas</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>:root{--bg:#06090f;--card:#0c1117;--border:#1e2a3a;--accent:#ff6d00;--accent2:#ff9100;--green:#00e676;--yellow:#ffd600;--red:#ff1744;--blue:#29b6f6;--purple:#e040fb;--text:#c8d6e5;--dim:#5a6a7a}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:13px}/*TOP BAR*/.topbar{height:48px;background:linear-gradient(90deg,#0d1520,#142030);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:20px;z-index:100}.topbar .logo{font-size:16px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px;white-space:nowrap}.topbar .logo i{font-size:20px}.sep{width:1px;height:28px;background:var(--border)}.kpi{display:flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px}.kpi .kv{font-size:16px;font-weight:700}.kpi .kl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}.kpi.green .kv{color:var(--green)}.kpi.orange .kv{color:var(--accent)}.kpi.blue .kv{color:var(--blue)}.kpi.purple .kv{color:var(--purple)}.topbar .clock{margin-left:auto;font-size:14px;color:var(--dim);font-family:monospace}/*TABS*/.tabs{height:36px;background:#0a1018;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:4px}.tab{padding:6px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;color:var(--dim);transition:.2s;border:1px solid transparent;border-bottom:none;display:flex;align-items:center;gap:6px}.tab:hover{color:#fff;background:rgba(255,255,255,.05)}.tab.active{color:var(--accent);background:var(--card);border-color:var(--border);border-bottom:1px solid var(--card);margin-bottom:-1px;font-weight:600}/*MAIN GRID*/.main{height:calc(100vh - 84px);display:grid;grid-template-columns:240px 1fr 280px;overflow:hidden}/*LEFT PANEL*/.left{background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}.left .lh{padding:10px 12px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}.agent-list{overflow-y:auto;flex:1;padding:4px}.ag{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:.15s;border:1px solid transparent;margin-bottom:2px}.ag:hover{background:rgba(255,255,255,.04);border-color:var(--border)}.ag.selected{background:rgba(255,109,0,.08);border-color:var(--accent)}.ag .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.ag .dot.on{background:var(--green);box-shadow:0 0 4px var(--green)}.ag .dot.busy{background:var(--yellow);box-shadow:0 0 4px var(--yellow);animation:blink 1.5s infinite}.ag .dot.off{background:var(--red)}.ag .ai{flex:1;min-width:0}.ag .an{font-size:11px;font-weight:600;color:#e0e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ag .as{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ag .at{font-size:9px;color:var(--accent);font-weight:600;margin-left:auto;white-space:nowrap}/*CENTER*/.center{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}/*SQUAD GRID*/.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;transition:.2s;cursor:pointer;position:relative;overflow:hidden}.sc:hover{border-color:var(--accent);transform:translateY(-2px)}.sc .stop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.sc .sname{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}.sc .scount{font-size:18px;font-weight:700}.sc .sbar{height:3px;background:#1a2535;border-radius:2px;margin:8px 0}.sc .sfill{height:100%;border-radius:2px;transition:width 1.5s ease}.sc .sbot{display:flex;justify-content:space-between;font-size:9px;color:var(--dim)}.sc .sdet{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}.sc .sd{background:rgba(255,255,255,.02);border-radius:4px;padding:6px;text-align:center}.sc .sdv{font-size:13px;font-weight:700}.sc .sdl{font-size:8px;color:var(--dim)}/*AGENT DETAIL*/.detail{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;display:none}.detail.show{display:block}.detail .dh{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}.detail .davatar{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}.detail .dname{font-size:15px;font-weight:700;color:#fff}.detail .drole{font-size:10px;color:var(--dim)}.detail .dstatus{margin-left:auto;padding:4px 10px;border-radius:12px;font-size:10px;font-weight:600}.detail .dstatus.on{background:rgba(0,230,118,.12);color:var(--green)}.detail .dstatus.busy{background:rgba(255,214,0,.12);color:var(--yellow)}.detail .dm{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}.detail .dmc{background:rgba(255,255,255,.03);border-radius:6px;padding:8px;text-align:center}.detail .dmv{font-size:15px;font-weight:700;color:var(--accent)}.detail .dml{font-size:8px;color:var(--dim)}.detail .tasks{max-height:200px;overflow-y:auto}.detail .task{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;margin-bottom:3px;font-size:11px;border-left:3px solid var(--border);animation:slideR .3s ease}.task .ticon{font-size:10px}.task .ttext{flex:1;color:var(--text)}.task .ttime{font-size:9px;color:var(--dim);font-family:monospace}.task.running{border-color:var(--green);background:rgba(0,230,118,.04)}.task.queue{border-color:var(--blue);background:rgba(41,182,246,.04)}.task.done{border-color:var(--dim);opacity:.6}/*RIGHT PANEL*/.right{background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}.right .rh{padding:10px 12px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}.feed{overflow-y:auto;flex:1;padding:6px}.fe{padding:6px 8px;margin-bottom:3px;border-radius:4px;font-size:10px;animation:slideL .3s ease;border-left:3px solid var(--border)}.fe.s{border-color:var(--green);background:rgba(0,230,118,.03)}.fe.i{border-color:var(--blue);background:rgba(41,182,246,.03)}.fe.w{border-color:var(--yellow);background:rgba(255,214,0,.03)}.fe.e{border-color:var(--red);background:rgba(255,23,68,.03)}.fe .ft{color:var(--dim);font-family:monospace;font-size:9px}.fe .fn{font-weight:600;color:#fff}.fe .fa{color:var(--text)}/*CHART*/.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}.chart-title{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}.chart{height:80px;display:flex;align-items:flex-end;gap:1px}.chart .cbar{flex:1;border-radius:2px 2px 0 0;transition:height .8s ease;min-width:2px}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}@keyframes slideR{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}@keyframes slideL{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.anim{animation:fadeUp .4s ease}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}</style></head><body><div class="topbar"><div class="logo"><i class="fas fa-paw"></i>Central 1000 Agentes IA</div><div class="sep"></div><div class="kpi green"><div><div class="kv" id="kOnline">--</div><div class="kl">Online</div></div></div><div class="kpi orange"><div><div class="kv" id="kTasks">--</div><div class="kl">Tarefas/min</div></div></div><div class="kpi blue"><div><div class="kv" id="kClients">--</div><div class="kl">Clientes</div></div></div><div class="kpi purple"><div><div class="kv" id="kRevenue">--</div><div class="kl">Receita</div></div></div><div class="sep"></div><div class="kpi"><div><div class="kv" style="color:var(--green)"><i class="fas fa-circle" style="font-size:6px"></i> SISTEMA ATIVO</div><div class="kl">Todos os nós operacionais</div></div></div><div class="clock" id="clock">--:--:--</div></div><div class="tabs"><div class="tab active" onclick="showTab(0)"><i class="fas fa-th-large"></i>Visão Geral</div><div class="tab" onclick="showTab(1)"><i class="fas fa-users"></i>Agentes</div><div class="tab" onclick="showTab(2)"><i class="fas fa-tasks"></i>Tarefas</div><div class="tab" onclick="showTab(3)"><i class="fas fa-chart-area"></i>Performance</div><div class="tab" onclick="showTab(4)"><i class="fas fa-cog"></i>Config</div></div><div class="main"><div class="left"><div class="lh"><i class="fas fa-satellite-dish"></i>Agentes Ativos <span id="agCount" style="color:var(--green)">0</span></div><div class="agent-list" id="agList"></div></div><div class="center" id="centerPanel"></div><div class="right"><div class="rh"><i class="fas fa-stream"></i>Feed em Tempo Real</div><div class="feed" id="feedLog"></div></div></div><script>
const SQ=[{n:'Vendas Elite',i:'fa-shopping-cart',c:247,clr:'#ff6d00',tasks:['Processando venda','Negociando desconto','Fechando pedido','Upsell produto','Cross-sell item','Follow-up cliente','Proposta orcamento','Convertendo lead']},{n:'Marketing Neural',i:'fa-brain',c:183,clr:'#e040fb',tasks:['Gerando campanha','Otimizando SEO','A/B testing anuncio','Segmentando audiencia','Criando copy','Analisando ROI','Disparando email','Monitorando trends']},{n:'Atendimento 24/7',i:'fa-headset',c:156,clr:'#00e676',tasks:['Respondendo ticket','Chat ao vivo','Resolvendo reclamacao','Encaminhando caso','Pesquisa satisfacao','FAQ automatizado','Suporte tecnico','Retorno cliente']},{n:'Analytics Pro',i:'fa-chart-line',c:128,clr:'#29b6f6',tasks:['Gerando relatorio','Dashboard update','Previsao demanda','Analise cohort','Metricas vendas','KPI monitoring','Trend analysis','Data pipeline']},{n:'Seguranca',i:'fa-shield-alt',c:89,clr:'#ff1744',tasks:['Scan vulnerabilidade','Monitorando firewall','Detectando fraude','Auditoria acesso','Bloqueando ameaca','Verificando SSL','Backup dados','Patch sistema']},{n:'Logistica',i:'fa-truck',c:197,clr:'#ffd600',tasks:['Rastreando entrega','Otimizando rota','Gerenciando estoque','Processando envio','Separando pedido','Conferindo carga','Atualizando tracking','Calculando frete']}];
const NAMES=['Luna','Atlas','Nova','Titan','Echo','Pulse','Nexus','Vega','Storm','Blaze','Frost','Cipher','Spark','Omega','Delta','Zenith','Orion','Falcon','Phoenix','Raven','Matrix','Byte','Flux','Volt','Core','Helix','Prism','Apex','Zion','Neo','Aria','Sage','Kira','Lynx','Onyx','Jade','Rex','Ivy','Axel','Iris'];
let agents=[],selAgent=null,totalTasks=0,totalClients=0,totalRevenue=0,chartData=[];
function init(){agents=[];let id=1;SQ.forEach((sq,si)=>{for(let j=0;j<sq.c;j++){const nm=NAMES[(id-1)%NAMES.length];const states=['on','on','on','on','on','busy','busy'];agents.push({id:id++,name:nm+'-'+sq.n.split(' ')[0]+'-'+String(j+1).padStart(3,'0'),squad:si,state:states[Math.floor(Math.random()*7)],task:sq.tasks[Math.floor(Math.random()*sq.tasks.length)]+' #'+Math.floor(Math.random()*9000+1000),tasksD:Math.floor(Math.random()*200+50),clients:Math.floor(Math.random()*80+10),revenue:Math.floor(Math.random()*5000+500),cpu:Math.floor(Math.random()*40+30),mem:Math.floor(Math.random()*30+20),uptime:Math.floor(Math.random()*200+100)+'h',lastAct:new Date()})}});for(let i=0;i<60;i++)chartData.push(Math.floor(Math.random()*80+20));renderAgentList();renderCenter();updateKPIs();startTimers()}
function renderAgentList(){const el=document.getElementById('agList');el.innerHTML='';const shown=agents.filter(a=>a.state!=='off').slice(0,40);document.getElementById('agCount').textContent=agents.filter(a=>a.state!=='off').length;shown.forEach(a=>{const d=document.createElement('div');d.className='ag'+(selAgent===a.id?' selected':'');d.onclick=()=>{selAgent=a.id;renderAgentList();renderCenter()};d.innerHTML='<div class="dot '+a.state+'"></div><div class="ai"><div class="an">'+a.name+'</div><div class="as">'+a.task+'</div></div><div class="at">'+a.tasksD+'</div>';el.appendChild(d)})}
function renderCenter(){const el=document.getElementById('centerPanel');if(selAgent){const a=agents.find(x=>x.id===selAgent);const sq=SQ[a.squad];el.innerHTML='<div class="detail show anim"><div class="dh"><div class="davatar" style="background:'+sq.clr+'20;color:'+sq.clr+'"><i class="fas '+sq.i+'"></i></div><div><div class="dname">'+a.name+'</div><div class="drole">'+sq.n+' | ID: AGT-'+String(a.id).padStart(4,'0')+'</div></div><div class="dstatus '+a.state+'">'+(a.state==='on'?'ATIVO':'OCUPADO')+'</div></div><div class="dm"><div class="dmc"><div class="dmv">'+a.tasksD+'</div><div class="dml">Tarefas Hoje</div></div><div class="dmc"><div class="dmv">'+a.clients+'</div><div class="dml">Clientes</div></div><div class="dmc"><div class="dmv">R$'+a.revenue.toLocaleString()+'</div><div class="dml">Receita</div></div><div class="dmc"><div class="dmv">'+a.uptime+'</div><div class="dml">Uptime</div></div></div><div class="dm"><div class="dmc"><div class="dmv" style="color:var(--green)">'+a.cpu+'%</div><div class="dml">CPU</div></div><div class="dmc"><div class="dmv" style="color:var(--blue)">'+a.mem+'%</div><div class="dml">Memoria</div></div><div class="dmc"><div class="dmv" style="color:var(--yellow)">'+Math.floor(Math.random()*50+10)+'ms</div><div class="dml">Latencia</div></div><div class="dmc"><div class="dmv" style="color:var(--purple)">'+Math.floor(Math.random()*20+80)+'%</div><div class="dml">Precisao</div></div></div><div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:8px"><i class="fas fa-tasks"></i> Fila de Tarefas</div><div class="tasks" id="taskList"></div></div>';const tl=document.getElementById('taskList');for(let i=0;i<8;i++){const cls=i===0?'running':i<3?'queue':'done';const task=sq.tasks[Math.floor(Math.random()*sq.tasks.length)];const tid=Math.floor(Math.random()*9000+1000);const tm=new Date();tm.setMinutes(tm.getMinutes()-i*3);tl.innerHTML+='<div class="task '+cls+'"><span class="ticon">'+(cls==='running'?'<i class="fas fa-spinner fa-spin" style="color:var(--green)"></i>':cls==='queue'?'<i class="fas fa-clock" style="color:var(--blue)"></i>':'<i class="fas fa-check" style="color:var(--dim)"></i>')+'</span><span class="ttext">'+task+' #'+tid+'</span><span class="ttime">'+tm.toLocaleTimeString('pt-BR')+'</span></div>'}}else{renderOverview(el)}}
function renderOverview(el){el.innerHTML='<div class="sg anim">'+SQ.map((sq,i)=>{const on=Math.floor(sq.c*.9+Math.random()*sq.c*.08);const eff=Math.floor(85+Math.random()*13);const tph=Math.floor(on*(3+Math.random()*5));const rev=Math.floor(on*(50+Math.random()*200));return'<div class="sc" style="border-top:2px solid '+sq.clr+'"><div class="stop"><div class="sname" style="color:'+sq.clr+'"><i class="fas '+sq.i+'"></i> '+sq.n+'</div><div class="scount" style="color:'+sq.clr+'">'+sq.c+'</div></div><div class="sbar"><div class="sfill" style="width:'+eff+'%;background:'+sq.clr+'"></div></div><div class="sbot"><span>'+on+'/'+sq.c+' online</span><span>'+eff+'% eficiencia</span></div><div class="sdet"><div class="sd"><div class="sdv" style="color:'+sq.clr+'">'+tph+'</div><div class="sdl">Tarefas/hora</div></div><div class="sd"><div class="sdv" style="color:'+sq.clr+'">R$'+rev.toLocaleString()+'</div><div class="sdl">Receita/hora</div></div></div></div>'}).join('')+'</div><div class="chart-wrap anim"><div class="chart-title"><i class="fas fa-chart-area"></i> Throughput - Ultimas 60 min</div><div class="chart" id="mainChart"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px" class="anim"><div class="chart-wrap"><div class="chart-title"><i class="fas fa-network-wired"></i> Rede Neural - Conexoes</div><div id="netVis" style="height:100px;position:relative;overflow:hidden"></div></div><div class="chart-wrap"><div class="chart-title"><i class="fas fa-memory"></i> Recursos do Sistema</div><div id="sysRes"></div></div></div>';renderChart();renderNetwork();renderSysRes()}
function renderChart(){const el=document.getElementById('mainChart');if(!el)return;el.innerHTML='';const max=Math.max(...chartData);chartData.forEach(v=>{const h=Math.max(4,(v/max)*75);const colors=['#ff6d00','#e040fb','#00e676','#29b6f6','#ffd600','#ff1744'];const c=colors[Math.floor(Math.random()*colors.length)];const bar=document.createElement('div');bar.className='cbar';bar.style.cssText='height:'+h+'px;background:'+c+';opacity:0.7';el.appendChild(bar)})}
function renderNetwork(){const el=document.getElementById('netVis');if(!el)return;let html='';for(let i=0;i<30;i++){const x=Math.random()*95;const y=Math.random()*90;const s=3+Math.random()*5;const colors=['#ff6d00','#e040fb','#00e676','#29b6f6'];const c=colors[Math.floor(Math.random()*4)];html+='<div style="position:absolute;left:'+x+'%;top:'+y+'%;width:'+s+'px;height:'+s+'px;border-radius:50%;background:'+c+';box-shadow:0 0 '+s*2+'px '+c+';animation:blink '+(1+Math.random()*3)+'s infinite"></div>'}el.innerHTML=html}
function renderSysRes(){const el=document.getElementById('sysRes');if(!el)return;const items=[{n:'CPU Cluster',v:Math.floor(40+Math.random()*30),c:'var(--accent)'},{n:'RAM Alocada',v:Math.floor(30+Math.random()*25),c:'var(--blue)'},{n:'GPU Neural',v:Math.floor(50+Math.random()*35),c:'var(--purple)'},{n:'Disco I/O',v:Math.floor(20+Math.random()*20),c:'var(--green)'}];el.innerHTML=items.map(i=>'<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px"><span>'+i.n+'</span><span style="color:'+i.c+';font-weight:700">'+i.v+'%</span></div><div style="height:4px;background:#1a2535;border-radius:2px"><div style="height:100%;width:'+i.v+'%;background:'+i.c+';border-radius:2px;transition:width 1s"></div></div></div>').join('')}
function updateKPIs(){const online=agents.filter(a=>a.state!=='off').length;document.getElementById('kOnline').textContent=online;document.getElementById('kTasks').textContent=Math.floor(800+Math.random()*400);totalTasks+=Math.floor(Math.random()*300+100);totalClients+=Math.floor(Math.random()*50+20);totalRevenue+=Math.floor(Math.random()*8000+3000);document.getElementById('kClients').textContent=totalClients.toLocaleString();document.getElementById('kRevenue').textContent='R$'+totalRevenue.toLocaleString()}
function addLog(){const f=document.getElementById('feedLog');const sq=SQ[Math.floor(Math.random()*6)];const nm=NAMES[Math.floor(Math.random()*NAMES.length)];const task=sq.tasks[Math.floor(Math.random()*sq.tasks.length)];const tid=Math.floor(Math.random()*9000+1000);const t=new Date().toLocaleTimeString('pt-BR');const types=['s','i','w','s','s','i'];const tp=types[Math.floor(Math.random()*6)];const d=document.createElement('div');d.className='fe '+tp;d.innerHTML='<span class="ft">'+t+'</span> <span class="fn">'+nm+'</span> <span class="fa">'+task+' #'+tid+'</span>';f.insertBefore(d,f.firstChild);if(f.children.length>80)f.removeChild(f.lastChild)}
function updateAgents(){agents.forEach(a=>{if(Math.random()<.3){const sq=SQ[a.squad];a.task=sq.tasks[Math.floor(Math.random()*sq.tasks.length)]+' #'+Math.floor(Math.random()*9000+1000);a.tasksD+=Math.floor(Math.random()*3);a.clients+=Math.random()<.3?1:0;a.revenue+=Math.floor(Math.random()*100);a.cpu=Math.min(95,Math.max(15,a.cpu+Math.floor(Math.random()*11-5)));a.mem=Math.min(85,Math.max(10,a.mem+Math.floor(Math.random()*7-3)))}})}
function showTab(n){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));if(n===0){selAgent=null;renderCenter()}if(n===1){selAgent=null;renderAgentList();renderCenter()}}
function startTimers(){setInterval(()=>{const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString('pt-BR')},1000);setInterval(addLog,1200);setInterval(()=>{updateAgents();renderAgentList();if(selAgent)renderCenter();else{chartData.shift();chartData.push(Math.floor(Math.random()*80+20));renderChart()}updateKPIs()},4000);setInterval(()=>{if(!selAgent){renderCenter()}},15000)}
init();
</script></body></html>
