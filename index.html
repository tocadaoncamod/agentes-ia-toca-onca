<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Central 1000 Agentes IA - Toca da Onca</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;overflow-x:hidden}header{background:linear-gradient(135deg,#1a0500,#2d0f00);padding:12px 25px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #ff6d00;position:sticky;top:0;z-index:100}.logo{font-size:1.5em;font-weight:bold;color:#ff6d00}.hdr-stats{display:flex;gap:20px}.hs{text-align:center}.hs .n{font-size:1.4em;font-weight:bold;color:#ff6d00}.hs .l{font-size:.7em;color:#ffab40}.main{display:grid;grid-template-columns:280px 1fr 300px;height:calc(100vh - 52px)}.sidebar{background:#111;border-right:1px solid #333;overflow-y:auto;padding:10px}.sidebar h3{color:#ff6d00;font-size:.85em;padding:8px;border-bottom:1px solid #333;margin-bottom:5px}.agent{display:flex;align-items:center;padding:8px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:.2s;border:1px solid transparent}.agent:hover{background:#1a1a1a;border-color:#ff6d00}.agent .dot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0}.dot.on{background:#00e676;box-shadow:0 0 6px #00e676;animation:pulse 2s infinite}.dot.busy{background:#ffd600;box-shadow:0 0 6px #ffd600;animation:pulse 1s infinite}.dot.off{background:#f44336}.agent .info{flex:1;min-width:0}.agent .nm{font-size:.8em;font-weight:bold;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.agent .st{font-size:.65em;color:#aaa}.center{padding:15px;overflow-y:auto}.panel{background:#111;border:1px solid #333;border-radius:12px;padding:15px;margin-bottom:15px}.panel h2{color:#ff6d00;font-size:1.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:15px}.mc{background:linear-gradient(135deg,#1a0800,#0a0a0a);border:1px solid #333;border-radius:10px;padding:15px;text-align:center}.mc .v{font-size:1.8em;font-weight:bold;color:#ff6d00}.mc .lb{font-size:.7em;color:#aaa;margin-top:3px}.grid6{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.sq{background:#0d0d0d;border:1px solid #333;border-radius:10px;padding:12px;transition:.3s}.sq:hover{border-color:#ff6d00}.sq .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.sq .sn{font-size:.85em;font-weight:bold;color:#ffab40}.sq .sc{font-size:.7em;color:#00e676;font-weight:bold}.sq .bar{height:4px;background:#222;border-radius:2px;overflow:hidden;margin-bottom:6px}.sq .fill{height:100%;border-radius:2px;transition:width 1s}.sq .sd{font-size:.65em;color:#888}.feed{background:#111;border-left:1px solid #333;overflow-y:auto;padding:10px}.feed h3{color:#ff6d00;font-size:.85em;padding:8px;border-bottom:1px solid #333;margin-bottom:5px;position:sticky;top:0;background:#111}.log{padding:6px 8px;border-left:3px solid #333;margin-bottom:4px;font-size:.7em;animation:slideIn .3s ease}.log.success{border-color:#00e676}.log.warning{border-color:#ffd600}.log.info{border-color:#29b6f6}.log.error{border-color:#f44336}.log .lt{color:#666;margin-right:5px}.log .la{color:#fff}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}@media(max-width:900px){.main{grid-template-columns:1fr}.sidebar,.feed{display:none}.metrics{grid-template-columns:repeat(2,1fr)}.grid6{grid-template-columns:repeat(2,1fr)}}</style></head><body><header><div class="logo"><i class="fas fa-paw"></i> Central 1000 Agentes IA</div><div class="hdr-stats"><div class="hs"><div class="n" id="totalOn">0</div><div class="l">ONLINE</div></div><div class="hs"><div class="n" id="totalTasks">0</div><div class="l">TAREFAS/MIN</div></div><div class="hs"><div class="n" id="uptime">99.8%</div><div class="l">UPTIME</div></div><div class="hs"><div class="n" id="clock">--:--:--</div><div class="l">HORA</div></div></div></header><div class="main"><div class="sidebar"><h3><i class="fas fa-users"></i> AGENTES ATIVOS (TOP 20)</h3><div id="agentList"></div></div><div class="center"><div class="metrics"><div class="mc"><div class="v" id="m1">0</div><div class="lb">Agentes Ativos</div></div><div class="mc"><div class="v" id="m2">0</div><div class="lb">Tarefas Hoje</div></div><div class="mc"><div class="v" id="m3">0</div><div class="lb">Clientes Atendidos</div></div><div class="mc"><div class="v" id="m4">R$0</div><div class="lb">Receita Gerada</div></div></div><div class="panel"><h2><i class="fas fa-th"></i> Esquadroes de Agentes</h2><div class="grid6" id="squads"></div></div><div class="panel"><h2><i class="fas fa-bolt"></i> Atividade em Tempo Real</h2><div id="liveBar" style="height:60px;display:flex;align-items:end;gap:2px"></div></div></div><div class="feed"><h3><i class="fas fa-stream"></i> LOG DE ATIVIDADES</h3><div id="feedLog"></div></div></div><script>const squads=[{n:'Vendas Elite',i:'fa-shopping-cart',c:247,color:'#ff6d00'},{n:'Marketing Neural',i:'fa-brain',c:183,color:'#e040fb'},{n:'Atendimento 24/7',i:'fa-headset',c:156,color:'#00e676'},{n:'Analytics Pro',i:'fa-chart-line',c:128,color:'#29b6f6'},{n:'Seguranca',i:'fa-shield-alt',c:89,color:'#f44336'},{n:'Logistica',i:'fa-truck',c:197,color:'#ffd600'}];const names=['Luna','Atlas','Nova','Titan','Echo','Pulse','Nexus','Vega','Storm','Blaze','Frost','Cipher','Spark','Omega','Delta','Zenith','Orion','Falcon','Phoenix','Raven','Matrix','Byte','Flux','Volt','Core','Helix','Prism','Apex','Zion','Neo'];const actions=['Processando pedido #','Analisando cliente #','Otimizando campanha #','Gerando relatorio #','Respondendo ticket #','Monitorando estoque #','Classificando produto #','Enviando notificacao #','Atualizando preco #','Prevendo demanda #'];const types=['success','info','warning','success','info','success'];let taskCount=0,clientCount=0,revenue=0;function init(){const sq=document.getElementById('squads');squads.forEach(s=>{const perc=85+Math.random()*14;sq.innerHTML+=`<div class="sq"><div class="sh"><span class="sn"><i class="fas ${s.i}"></i> ${s.n}</span><span class="sc">${s.c}</span></div><div class="bar"><div class="fill" style="width:${perc}%;background:${s.color}"></div></div><div class="sd">${Math.floor(perc)}% eficiencia | ${Math.floor(s.c*.93)} online</div></div>`});updateAgentList();updateMetrics();startLogs();startBars();setInterval(updateClock,1000);setInterval(updateMetrics,3000);setInterval(updateAgentList,5000);updateClock()}function updateClock(){const d=new Date();document.getElementById('clock').textContent=d.toLocaleTimeString('pt-BR')}function updateAgentList(){const el=document.getElementById('agentList');el.innerHTML='';for(let i=0;i<20;i++){const nm=names[i];const squad=squads[Math.floor(Math.random()*squads.length)];const states=['on','on','on','on','busy'];const st=states[Math.floor(Math.random()*states.length)];const act=actions[Math.floor(Math.random()*actions.length)]+Math.floor(Math.random()*9000+1000);el.innerHTML+=`<div class="agent"><div class="dot ${st}"></div><div class="info"><div class="nm">${nm}-${squad.n.split(' ')[0]}-${String(i+1).padStart(3,'0')}</div><div class="st">${act}</div></div></div>`}document.getElementById('totalOn').textContent=Math.floor(950+Math.random()*50)}function updateMetrics(){taskCount+=Math.floor(Math.random()*500+200);clientCount+=Math.floor(Math.random()*100+50);revenue+=Math.floor(Math.random()*5000+2000);document.getElementById('m1').textContent=(950+Math.floor(Math.random()*50)).toLocaleString();document.getElementById('m2').textContent=taskCount.toLocaleString();document.getElementById('m3').textContent=clientCount.toLocaleString();document.getElementById('m4').textContent='R$'+(revenue).toLocaleString();document.getElementById('totalTasks').textContent=Math.floor(Math.random()*200+800)}function startLogs(){setInterval(()=>{const feed=document.getElementById('feedLog');const t=new Date().toLocaleTimeString('pt-BR');const nm=names[Math.floor(Math.random()*names.length)];const act=actions[Math.floor(Math.random()*actions.length)]+Math.floor(Math.random()*9000+1000);const tp=types[Math.floor(Math.random()*types.length)];const log=document.createElement('div');log.className='log '+tp;log.innerHTML=`<span class="lt">${t}</span><span class="la"><b>${nm}</b>: ${act}</span>`;feed.insertBefore(log,feed.firstChild);if(feed.children.length>50)feed.removeChild(feed.lastChild)},1500)}function startBars(){const el=document.getElementById('liveBar');setInterval(()=>{el.innerHTML='';for(let i=0;i<40;i++){const h=Math.floor(Math.random()*50+10);const colors=['#ff6d00','#e040fb','#00e676','#29b6f6','#ffd600'];const c=colors[Math.floor(Math.random()*colors.length)];el.innerHTML+=`<div style="flex:1;height:${h}px;background:${c};border-radius:2px;opacity:.8;transition:height .5s"></div>`}},2000)}init()</script></body></html>
